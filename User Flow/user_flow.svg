<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 60 1390 1210" font-family="Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4f9"/>
    </linearGradient>
    <linearGradient id="dec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8e1"/>
      <stop offset="1" stop-color="#ffe9a8"/>
    </linearGradient>
    <linearGradient id="role" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f0e6"/>
      <stop offset="1" stop-color="#d2e2cc"/>
    </linearGradient>
  </defs>

  <!-- =================== Entry ================== -->
  <circle cx="750" cy="90" r="9" fill="#222"/>
  <line x1="750" y1="99" x2="750" y2="118" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Screen: Открытие приложения -->
  <g>
    <rect x="635" y="120" width="230" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222" stroke-width="1.4"/>
    <text x="750" y="147" text-anchor="middle" font-size="13">Открытие веб-приложения</text>
  </g>
  <line x1="750" y1="164" x2="750" y2="184" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Screen: Страница авторизации -->
  <g>
    <rect x="635" y="186" width="230" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222" stroke-width="1.4"/>
    <text x="750" y="213" text-anchor="middle" font-size="13">Страница авторизации</text>
  </g>
  <line x1="750" y1="230" x2="750" y2="250" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Screen: Ввод логина и пароля -->
  <g>
    <rect x="635" y="252" width="230" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222" stroke-width="1.4"/>
    <text x="750" y="279" text-anchor="middle" font-size="13">Ввод логина и пароля</text>
  </g>
  <line x1="750" y1="296" x2="750" y2="316" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Проверка учётных данных -->
  <g>
    <polygon points="750,318 850,378 750,438 650,378" fill="url(#dec)" stroke="#222" stroke-width="1.4"/>
    <text x="750" y="372" text-anchor="middle" font-size="11">Проверка</text>
    <text x="750" y="388" text-anchor="middle" font-size="11">учётных данных</text>
  </g>

  <!-- "Неуспешно" loop back -->
  <path d="M 650,378 Q 470,378 470,208 L 635,208" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="295" font-size="11" font-style="italic">[неуспешно]</text>

  <!-- "Успешно" down -->
  <line x1="750" y1="438" x2="750" y2="465" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="757" y="455" font-size="11" font-style="italic">[успешно]</text>

  <!-- Decision: Определение роли -->
  <g>
    <polygon points="750,468 870,528 750,588 630,528" fill="url(#dec)" stroke="#222" stroke-width="1.4"/>
    <text x="750" y="522" text-anchor="middle" font-size="11">Определение</text>
    <text x="750" y="538" text-anchor="middle" font-size="11">роли пользователя</text>
  </g>

  <!-- ============== Four branches to columns ============== -->
  <!-- Column X centers: 160, 540, 920, 1300 (each 220 wide) -->
  <!-- Branch lines from role decision: outgoing top of each column at y≈ 640 -->

  <!-- Branch labels on lines -->
  <!-- To Developer column (left) -->
  <path d="M 630,528 L 160,640" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="565" font-size="11" font-style="italic">[разработчик]</text>

  <!-- To Team Lead column -->
  <path d="M 720,588 L 540,640" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="612" font-size="11" font-style="italic">[тимлид]</text>

  <!-- To Dept Head column -->
  <path d="M 780,588 L 920,640" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="845" y="615" font-size="11" font-style="italic">[руководитель отдела]</text>

  <!-- To Admin column -->
  <path d="M 870,528 L 1300,640" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1115" y="565" font-size="11" font-style="italic">[администратор]</text>

  <!-- =============== Column 1: Разработчик =============== -->
  <g>
    <rect x="40" y="615" width="240" height="36" fill="url(#role)" stroke="#222" stroke-width="1.4"/>
    <text x="160" y="640" text-anchor="middle" font-weight="bold" font-size="13">Разработчик</text>

    <rect x="50" y="668" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="694" text-anchor="middle" font-size="12">Индивидуальный дашборд</text>
  </g>
  <line x1="160" y1="712" x2="160" y2="730" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="732" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="758" text-anchor="middle" font-size="12">Выбор отчётного периода</text>
  </g>
  <line x1="160" y1="776" x2="160" y2="794" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="796" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="817" text-anchor="middle" font-size="11">Просмотр индивидуальных</text>
    <text x="160" y="833" text-anchor="middle" font-size="11">метрик (парная визуализация)</text>
  </g>
  <line x1="160" y1="846" x2="160" y2="864" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="866" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="892" text-anchor="middle" font-size="12">История показателей</text>
  </g>
  <line x1="160" y1="910" x2="160" y2="928" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="930" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="951" text-anchor="middle" font-size="11">Раскрытие формулы расчёта</text>
    <text x="160" y="967" text-anchor="middle" font-size="11">и источников данных</text>
  </g>
  <line x1="160" y1="980" x2="160" y2="998" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="1000" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="160" y="1026" text-anchor="middle" font-size="12">Экспорт отчёта в CSV</text>
  </g>

  <!-- =============== Column 2: Тимлид =============== -->
  <g>
    <rect x="420" y="615" width="240" height="36" fill="url(#role)" stroke="#222" stroke-width="1.4"/>
    <text x="540" y="640" text-anchor="middle" font-weight="bold" font-size="13">Тимлид команды</text>

    <rect x="430" y="668" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="694" text-anchor="middle" font-size="12">Список курируемых команд</text>
  </g>
  <line x1="540" y1="712" x2="540" y2="730" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="732" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="758" text-anchor="middle" font-size="12">Выбор команды и периода</text>
  </g>
  <line x1="540" y1="776" x2="540" y2="794" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="796" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="817" text-anchor="middle" font-size="11">Командный дашборд</text>
    <text x="540" y="833" text-anchor="middle" font-size="11">(парная визуализация)</text>
  </g>
  <line x1="540" y1="846" x2="540" y2="864" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="866" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="887" text-anchor="middle" font-size="11">Cycle Time MR</text>
    <text x="540" y="903" text-anchor="middle" font-size="11">с декомпозицией по фазам</text>
  </g>
  <line x1="540" y1="916" x2="540" y2="934" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="936" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="957" text-anchor="middle" font-size="11">Bus Factor по модулям</text>
    <text x="540" y="973" text-anchor="middle" font-size="11">и сигналы аномалий</text>
  </g>
  <line x1="540" y1="986" x2="540" y2="1004" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="1006" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="540" y="1032" text-anchor="middle" font-size="12">Экспорт отчёта в CSV</text>
  </g>

  <!-- =============== Column 3: Руководитель =============== -->
  <g>
    <rect x="800" y="615" width="240" height="36" fill="url(#role)" stroke="#222" stroke-width="1.4"/>
    <text x="920" y="640" text-anchor="middle" font-weight="bold" font-size="13">Руководитель отдела</text>

    <rect x="810" y="668" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="689" text-anchor="middle" font-size="11">Кросс-командный</text>
    <text x="920" y="705" text-anchor="middle" font-size="11">дашборд DORA</text>
  </g>
  <line x1="920" y1="718" x2="920" y2="736" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="810" y="738" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="764" text-anchor="middle" font-size="12">Выбор отчётного периода</text>
  </g>
  <line x1="920" y1="782" x2="920" y2="800" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="810" y="802" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="823" text-anchor="middle" font-size="11">Сравнение команд</text>
    <text x="920" y="839" text-anchor="middle" font-size="11">по пяти метрикам DORA</text>
  </g>
  <line x1="920" y1="852" x2="920" y2="870" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="810" y="872" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="893" text-anchor="middle" font-size="11">Динамика метрик</text>
    <text x="920" y="909" text-anchor="middle" font-size="11">во времени</text>
  </g>
  <line x1="920" y1="922" x2="920" y2="940" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="810" y="942" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="963" text-anchor="middle" font-size="11">Раскрытие формулы расчёта</text>
    <text x="920" y="979" text-anchor="middle" font-size="11">и источников данных</text>
  </g>
  <line x1="920" y1="992" x2="920" y2="1010" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="810" y="1012" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="920" y="1038" text-anchor="middle" font-size="12">Экспорт отчёта в CSV</text>
  </g>

  <!-- =============== Column 4: Администратор =============== -->
  <g>
    <rect x="1180" y="615" width="240" height="36" fill="url(#role)" stroke="#222" stroke-width="1.4"/>
    <text x="1300" y="640" text-anchor="middle" font-weight="bold" font-size="13">Администратор</text>

    <rect x="1190" y="668" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="694" text-anchor="middle" font-size="12">Панель администрирования</text>
  </g>
  <line x1="1300" y1="712" x2="1300" y2="730" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1190" y="732" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="753" text-anchor="middle" font-size="11">Подключение проекта</text>
    <text x="1300" y="769" text-anchor="middle" font-size="11">GitLab</text>
  </g>
  <line x1="1300" y1="782" x2="1300" y2="800" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1190" y="802" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="828" text-anchor="middle" font-size="12">Управление командами</text>
  </g>
  <line x1="1300" y1="846" x2="1300" y2="864" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1190" y="866" width="220" height="50" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="887" text-anchor="middle" font-size="11">Управление учётными</text>
    <text x="1300" y="903" text-anchor="middle" font-size="11">записями и ролями</text>
  </g>
  <line x1="1300" y1="916" x2="1300" y2="934" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1190" y="936" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="962" text-anchor="middle" font-size="12">Просмотр журнала аудита</text>
  </g>
  <line x1="1300" y1="980" x2="1300" y2="1004" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1190" y="1006" width="220" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="1300" y="1032" text-anchor="middle" font-size="12">Сохранение конфигурации</text>
  </g>

  <!-- =============== Merge (join from 4 branches) =============== -->
  <!-- Horizontal merge bar at y=1120 -->
  <path d="M 160,1044 Q 160,1100 470,1110 L 1030,1110 Q 1340,1100 1340,1050"
        fill="none" stroke="#222" stroke-width="1.5"/>

  <line x1="160" y1="1044" x2="160" y2="1080" stroke="#222" stroke-width="1.5"/>
  <line x1="540" y1="1050" x2="540" y2="1112" stroke="#222" stroke-width="1.5"/>
  <line x1="920" y1="1056" x2="920" y2="1112" stroke="#222" stroke-width="1.5"/>
  <line x1="1300" y1="1050" x2="1300" y2="1080" stroke="#222" stroke-width="1.5"/>

  <!-- Merge bar (UML join node) -->
  <rect x="600" y="1130" width="300" height="6" fill="#222"/>

  <!-- From merge bar to logout action -->
  <line x1="750" y1="1136" x2="750" y2="1166" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="620" y="1170" width="260" height="44" rx="22" ry="22" fill="url(#scr)" stroke="#222"/>
    <text x="750" y="1196" text-anchor="middle" font-size="12">Завершение сеанса (Logout)</text>
  </g>
  <line x1="750" y1="1214" x2="750" y2="1235" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Final node -->
  <circle cx="750" cy="1248" r="10" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="750" cy="1248" r="6" fill="#222"/>
</svg>
