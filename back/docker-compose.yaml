version: "3"
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - ./data:/var/lib/postgresql/data
    command: [postgres, -c, "listen_addresses=*", -c, log_statement=all]
    healthcheck:
      test: [CMD-SHELL, pg_isready -q -U postgres]
      interval: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
    networks:
      - app-network

  redis:
    image: "redis:7-alpine"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/var/lib/redis
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 524M
    networks:
      - app-network

  express-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APPNAME: ${APPNAME}
      PORT: 8080
      NODE_ENV: prod
      LOCALE: "true"
      PRODUCTION_URL: ${PRODUCTION_URL}
      LOGIN_RATE_LIMITER_ATTEMPTS: ${LOGIN_RATE_LIMITER_ATTEMPTS}
      LOGIN_RATE_LIMITER_TIMER_M: ${LOGIN_RATE_LIMITER_TIMER_M}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL}
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:${DATABASE_PORT}/${DATABASE_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Шифрование PAT-токенов GitLab (ВКР 2.2.3).
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      # Sync-планировщик (FR-02), опциональные.
      SYNC_INTERVAL_M: ${SYNC_INTERVAL_M}
      SYNC_RUN_ON_START: ${SYNC_RUN_ON_START}
    command: sh -c "npm run migrate:prod && npm run seed:mock:prod && npm run start"
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: 2048M
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/16
